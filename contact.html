<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contáctanos | Multisfera</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
<header class="header">
    <div class="header-logo">
        <img src="assets/Icon.png" class="icon">
        <img src="assets/LogoText.png" class="logotext">
    </div>
    <div class="header-menu">
        <ul class="ul-header">
            <li class="links-up"><a href="index.html">INICIO</a></li>
            <li class="links-up"><a href="#">PRODUCTOS</a></li>
            <li class="links-up"><a href="Sobre.html">SOBRE NOSOTROS</a></li>
            <li class="links-up"><a href="contact.html">CONTACTANOS</a></li>
        </ul>
    </div>

</header>
    <!-- Main -->
    <div class="container">
        <h1>Contáctanos</h1>
        <p>Si tienes alguna pregunta o necesitas más información, no dudes en escribirnos.</p>
        <form class="contact-form">
            <input type="text" placeholder="Tu nombre" required>
            <input type="email" placeholder="Tu correo electrónico" required>
            <textarea placeholder="Tu mensaje" rows="5" required></textarea>
            <button type="submit">Enviar</button>
        </form>
    </div>
</body>
